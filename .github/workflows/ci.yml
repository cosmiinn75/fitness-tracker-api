name: Fitness Tracker CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0

        env:
          MYSQL_DATABASE: fitness_tracker_test_db
          MYSQL_ROOT_PASSWORD: root

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=20s

    env:
      DB_URL: jdbc:mysql://127.0.0.1:3306/fitness_tracker_test_db
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: ci-test-jwt-secret-key-that-is-long-enough-2026
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 26
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "26"
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Build and run tests
        run: ./mvnw --batch-mode clean verify