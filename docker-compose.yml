services:
  mysql:
    image: mysql:8.0
    container_name: fitness-tracker-mysql
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: fitness_tracker_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_HOST: "%"

    ports:
      - "3307:3306"

    volumes:
      - fitness_tracker_mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build: .
    container_name: fitness-tracker-api
    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      DB_URL: jdbc:mysql://mysql:3306/fitness_tracker_db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate

volumes:
  fitness_tracker_mysql_data: